apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: namespaceclassbindings.namespaceclass.akuity.io
spec:
  group: namespaceclass.akuity.io
  scope: Cluster
  names:
    plural: namespaceclassbindings
    singular: namespaceclassbinding
    kind: NamespaceClassBinding
    shortNames:
      - ncb
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                namespaceName:
                  type: string
                className:
                  type: string
              required:
                - namespaceName
                - className
            status:
              type: object
              properties:
                observedNamespaceUID:
                  type: string
                observedClassGeneration:
                  type: integer
                  format: int64
                inventory:
                  type: array
                  items:
                    type: object
                    required:
                      - apiVersion
                      - kind
                      - name
                    properties:
                      apiVersion:
                        type: string
                      kind:
                        type: string
                      namespace:
                        type: string
                      name:
                        type: string
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true

